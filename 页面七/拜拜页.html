<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1948px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #2F4ECD; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }
    </style>
</head>
<body>
    <div id="viewport-wrapper">
        <div id="page-canvas">
            <img src="asset/结尾白云.svg" style="position: absolute; left: -50px; top: -67px;" alt="">
            <img src="asset/可玩小花1.svg" style="position: absolute; left: -174px; top: 271px;" alt="">
            <img src="asset/可玩小花2.svg" style="position: absolute; left: 1494px; top: 271px;" alt="">
            <img src="asset/可玩茎1.svg" style="position: absolute; left: 128px; top: 915px;" alt="">
            <img src="asset/可玩茎2.svg" style="position: absolute; left: 1796px; top: 915px;" alt="">
            <img src="asset/叶子右.png" style="position: absolute; left: 1355px; top: 663px;" alt="">
            <img src="asset/叶子左.png" style="position: absolute; left: 268px; top: 663px;" alt="">
            <div style="position: absolute; left: 764px; top: 415px; font-family: 'Tilt Warp', sans-serif; font-size: 64px; color: #FBF6F2; text-align: center; line-height: 158%;">Thank You<br>For Watching<br>(*^  ^*)</div>
        </div>
    </div>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1948, window.innerHeight / 1080);
            const offsetX = Math.max(0, (window.innerWidth - 1948 * scale) / 2);
            const offsetY = Math.max(0, (window.innerHeight - 1080 * scale) / 2);
            canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
