    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1948px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #FFFFFF; overflow: hidden; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 花瓣悬浮放大 */
        .hover-zoom {
            position: absolute;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: right center;
            pointer-events: auto;
        }
        .hover-zoom:hover {
            transform: scale(1.1);
        }

        /* 音符标签初始隐藏 */
        .note-label {
            display: none;
        }

        /* 提示文字闪烁动画 */
        .hint-text {
            animation: hintBlink 1s ease-in-out infinite;
        }
        @keyframes hintBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .hint-text.stopped {
            animation: none;
            opacity: 1;
        }

        /* 文字入场动画初始状态 */
        .entrance-title, .entrance-text {
            opacity: 0;
            transform: translateX(-100px);
        }
    </style>
</head>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1948, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 文字入场动画 - bounce.out 弹跳横向滑入效果
        // Creative → 树叶间隔 → Input 顺序
        gsap.fromTo('#text-creative',
            { x: -100, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.8, delay: 0, ease: 'bounce.out' }
        );
        gsap.fromTo('object[data*="树叶间隔.svg"]',
            { x: -100, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.8, delay: 0.15, ease: 'bounce.out' }
        );
        gsap.fromTo('#text-input',
            { x: -100, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.8, delay: 0.3, ease: 'bounce.out' }
        );
        gsap.fromTo('.entrance-text',
            { x: -80, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.8, stagger: 0.2, delay: 0.3, ease: 'bounce.out' }
        );

        // 返回按钮点击
        document.getElementById('back-btn').addEventListener('click', function() {
            if (window.parent && window.parent !== window) {
                // 在iframe中，通知父级关闭
                window.parent.postMessage('closePopup', '*');
            } else {
                window.close();
            }
        });

        // 橘花瓣点击跳转到社交.html
        document.getElementById('petal-orange').addEventListener('click', function() {
            window.location.href = '../social status/社交.html';
        });

        // 红花瓣点击跳转到情绪.html
        // 粉花瓣点击跳转到花语.html
        document.querySelectorAll('.hover-zoom').forEach(svg => {
            svg.addEventListener('click', function() {
                const style = this.getAttribute('style');
                if (style.includes('left: 1416px') && style.includes('top: 413px')) {
                    window.location.href = '../mood energy/情绪.html';
                } else if (style.includes('left: 1582px') && style.includes('top: 603px')) {
                    window.location.href = '../mood genre/花语.html';
                }
            });
        });

        // 黄花瓣点击返回
        document.getElementById('petal-green').addEventListener('click', function() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePopup', '*');
            } else {
                window.close();
            }
        });

        // 树林和树叶浮动动画 - 模仿被风吹动
        function floatAnimation(element, delay = 0) {
            gsap.to(element, {
                x: 10,
                y: 10,
                rotation: 0.3,
                duration: 2 + Math.random(),
                delay: delay,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
            gsap.to(element, {
                x: -10,
                y: -10,
                rotation: -0.3,
                duration: 2 + Math.random(),
                delay: delay + 1,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
        }

        const forestSvg = document.querySelector('img[src*="树林.svg"]');
        const leavesSvg = document.querySelector('object[data*="树叶间隔.svg"]');

        if (forestSvg) floatAnimation(forestSvg, 0);

        // 尺子拖动功能
        const rulerWrapper = document.getElementById('ruler-wrapper');
        const originalLeft = 340;
        const originalTop = 402;
        const triggerRadius = 80;

        // 花朵位置和对应音符 (使用实际中心点)
        const flowers = {
            '雏菊': { left: 370, top: 644, w: 144, h: 304, noteId: 'note-Fa' },
            '菟丝子': { left: 480, top: 768, w: 100, h: 200, noteId: 'note-Re' },
            '月季': { left: 687, top: 621, w: 69, h: 325, noteId: 'note-Sol' },
            '郁金香': { left: 781, top: 738, w: 87, h: 209, noteId: 'note-Me' },
            '铃兰': { left: 888, top: 869, w: 106, h: 83, noteId: 'note-Do' },
            '三色堇': { left: 1005, top: 531, w: 96, h: 415, noteId: 'note-La' },
            '玛格丽特': { left: 1133, top: 463, w: 106, h: 482, noteId: 'note-Si' }
        };

        const triggeredFlowers = new Set();

        let isDragging = false;
        let startX, startY, startLeft, startTop;

        rulerWrapper.addEventListener('mousedown', function(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = rulerWrapper.offsetLeft;
            startTop = rulerWrapper.offsetTop;
            rulerWrapper.style.cursor = 'grabbing';

            // 停止提示闪烁
            const hintText = document.getElementById('hint-text');
            if (hintText) {
                hintText.classList.add('stopped');
            }

            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;

            const canvas = document.getElementById('page-canvas');
            const scale = parseFloat(canvas.style.transform.replace('scale(', '').replace(')', '')) || 1;

            const deltaX = (e.clientX - startX) / scale;
            const deltaY = (e.clientY - startY) / scale;

            let newLeft = startLeft + deltaX;
            let newTop = startTop + deltaY;

            // 限制在画布范围内
            newLeft = Math.max(0, Math.min(newLeft, 1948 - 43));
            newTop = Math.max(0, Math.min(newTop, 1080 - 543));

            rulerWrapper.style.left = newLeft + 'px';
            rulerWrapper.style.top = newTop + 'px';

            // 检测与所有花朵的碰撞
            checkFlowerCollision();

            e.preventDefault();
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                rulerWrapper.style.cursor = 'grab';
                // 弹回原位 - 带Duang弹性效果
                rulerWrapper.style.transition = 'left 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
                rulerWrapper.style.left = originalLeft + 'px';
                rulerWrapper.style.top = originalTop + 'px';
                setTimeout(() => {
                    rulerWrapper.style.transition = '';
                }, 500);
            }
        });

        function checkFlowerCollision() {
            // 用尺子的边界框
            const rulerLeft = rulerWrapper.offsetLeft;
            const rulerTop = rulerWrapper.offsetTop;
            const rulerRight = rulerLeft + 43;
            const rulerBottom = rulerTop + 543;

            for (const [flowerName, data] of Object.entries(flowers)) {
                // 检测边界框是否重叠
                const isOverlapping = !(rulerRight < data.left ||
                                        rulerLeft > data.left + data.w ||
                                        rulerBottom < data.top ||
                                        rulerTop > data.top + data.h);

                if (isOverlapping && !triggeredFlowers.has(flowerName)) {
                    console.log(`${flowerName}: triggered`);
                    triggeredFlowers.add(flowerName);
                    triggerNoteAnimation(data.noteId);
                }
            }
        }

        function triggerNoteAnimation(noteId) {
            const noteEl = document.getElementById(noteId);
            if (!noteEl) return;

            // 播放音符声音
            const noteSounds = {
                'note-Fa': 'sfx-fa',
                'note-Re': 'sfx-re',
                'note-Do': 'sfx-do',
                'note-Me': 'sfx-mi',
                'note-Sol': 'sfx-sol',
                'note-La': 'sfx-la',
                'note-Si': 'sfx-si'
            };
            const sfxId = noteSounds[noteId];
            if (sfxId) {
                const sfx = document.getElementById(sfxId);
                sfx.currentTime = 0;
                sfx.play().catch(() => {});
            }

            // 显示音符
            noteEl.style.display = 'block';
            noteEl.style.opacity = '1';
            noteEl.style.color = '#999999';

            // 放大缩小闪烁两次
            let count = 0;
            const blinkInterval = setInterval(() => {
                count++;
                if (count <= 4) {
                    noteEl.style.transform = count % 2 === 1 ? 'scale(1.8)' : 'scale(1)';
                    noteEl.style.transition = 'transform 0.15s ease';
                } else {
                    clearInterval(blinkInterval);
                    noteEl.style.transform = 'scale(1)';
                    noteEl.style.transition = '';
                }
            }, 150);
        }

        // 背景音乐
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2;
        function playBgm() {
            bgm.play().catch(() => {});
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playBgm, 100);
        } else {
            window.addEventListener('load', playBgm);
        }
    </script>
</body>
</html>
