    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1948px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #FFFFFF; overflow: hidden; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 悬浮放大效果 */
        .hover-zoom {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: right center;
            pointer-events: auto;
        }
        .hover-zoom:hover {
            transform: scale(1.1);
        }

        /* 文字入场动画初始状态 */
        .entrance-title {
            opacity: 0;
            transform: translateX(-100px);
        }

        /* 卡片悬浮动画 - 元素从左右滑入 */
        .card-container {
            position: absolute;
            cursor: pointer;
            perspective: 1000px;
            pointer-events: auto;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            pointer-events: none;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .card-element {
            position: absolute;
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            pointer-events: none;
        }
        .card-element.from-left {
            transform: translateX(-50px);
        }
        .card-element.from-right {
            transform: translateX(50px);
        }
        .card-container:hover .card-element {
            opacity: 1;
        }
        .card-container:hover .card-element.from-left {
            transform: translateX(0);
        }
        .card-container:hover .card-element.from-right {
            transform: translateX(0);
        }
        .card-container:not(:hover) .card-element {
            opacity: 0;
        }
        .card-container:not(:hover) .card-element.from-left {
            transform: translateX(-50px);
        }
        .card-container:not(:hover) .card-element.from-right {
            transform: translateX(50px);
        }

        /* 雨滴渐显动画 */
        .raindrop {
            transform: translateY(-10px);
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            transition-delay: 0.2s;
        }
        .card-container:hover .raindrop {
            transform: translateY(10px);
            opacity: 1;
        }
        .card-container:not(:hover) .raindrop {
            transform: translateY(-10px);
            opacity: 0;
            transition-delay: 0s;
        }

        /* 提示文字闪烁动画 */
        @keyframes hintBlink {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .hint-text {
            animation: hintBlink 1.5s ease-in-out infinite;
        }
        .hint-text.hidden {
            animation: none;
        }

        /* mood flower悬浮放大效果 */
        .mood-flower {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1948, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 树林和树叶浮动动画 - 模仿被风吹动
        function floatAnimation(element, delay = 0) {
            gsap.to(element, {
                x: 10,
                y: 10,
                rotation: 0.3,
                duration: 2 + Math.random(),
                delay: delay,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
            gsap.to(element, {
                x: -10,
                y: -10,
                rotation: -0.3,
                duration: 2 + Math.random(),
                delay: delay + 1,
                repeat: -1,
                yoyo: true,
                ease: 'sine.inOut'
            });
        }

        const forestSvg = document.querySelector('img[src*="树林.svg"]');
        const forestBottomSvg = document.querySelector('img[src*="树林底部.svg"]');
        const leavesSvg = document.querySelector('object[data*="树叶间隔.svg"]');

        if (forestSvg) floatAnimation(forestSvg, 0);
        if (forestBottomSvg) floatAnimation(forestBottomSvg, 0.2);

        // 点击事件
        document.querySelectorAll('.hover-zoom').forEach(svg => {
            svg.addEventListener('click', function() {
                const style = this.getAttribute('style');
                if (style.includes('left: 1568px') || style.includes('left: 1416px') && style.includes('top: 413px')) {
                    // back按钮和红绿花瓣 - 返回
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage('closePopup', '*');
                    } else {
                        window.close();
                    }
                } else if (style.includes('left: 1582px') && style.includes('top: 390px')) {
                    // 黄花瓣 - 跳转输入.html
                    window.location.href = '../creative input/输入.html';
                } else if (style.includes('left: 1416px') && style.includes('top: 435px')) {
                    // 橘花瓣 - 跳转社交.html
                    window.location.href = '../social status/社交.html';
                } else if (style.includes('left: 1582px') && style.includes('top: 603px')) {
                    // 粉花瓣 - 跳转到花语.html
                    window.location.href = '../mood genre/花语.html';
                }
            });
        });

        // 文字入场动画 - bounce.out弹跳横向滑入效果
        // Mood → 树叶间隔 → Energy → Flower vitality → I connect...
        const moodText = document.querySelector('.entrance-title');
        const leavesInterval = document.querySelector('object[data*="树叶间隔.svg"]');
        const allEntranceTitles = document.querySelectorAll('.entrance-title');
        const energyText = allEntranceTitles[1];
        const flowerVitalityText = allEntranceTitles[2];
        const iConnectText = allEntranceTitles[3];

        if (moodText) gsap.fromTo(moodText, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.8, delay: 0, ease: 'bounce.out' });
        if (leavesInterval) gsap.fromTo(leavesInterval, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.8, delay: 0.3, ease: 'power4.out' });
        if (energyText) gsap.fromTo(energyText, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.8, delay: 0.5, ease: 'bounce.out' });
        if (flowerVitalityText) gsap.fromTo(flowerVitalityText, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.8, delay: 0.45, ease: 'bounce.out' });
        if (iConnectText) gsap.fromTo(iConnectText, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 0.8, delay: 0.6, ease: 'bounce.out' });

        // 卡片悬浮时提示文字停止闪烁
        const hintText = document.querySelector('.hint-text');
        const originalText = 'Interact with the card for the full scene';
        const flowerText = 'Hover over the flower line to play notes.';

        document.querySelectorAll('.card-container').forEach(card => {
            card.addEventListener('mouseenter', function() {
                hintText.classList.add('hidden');
            });
        });

        // 卡片悬浮播放声音
        document.querySelectorAll('.card-container').forEach((card, index) => {
            card.addEventListener('mouseenter', function() {
                if (card.classList.contains('flipped')) return;
                if (index === 0) {
                    // 多云
                    document.getElementById('sfx-cloudy').currentTime = 0;
                    document.getElementById('sfx-cloudy').volume = 0.6;
                    document.getElementById('sfx-cloudy').play().catch(() => {});
                } else if (index === 1) {
                    // 晴天
                    document.getElementById('sfx-sunny').currentTime = 0;
                    document.getElementById('sfx-sunny').volume = 0.3;
                    document.getElementById('sfx-sunny').play().catch(() => {});
                } else if (index === 2) {
                    // 雨天
                    document.getElementById('sfx-rainy').currentTime = 0;
                    document.getElementById('sfx-rainy').volume = 0.3;
                    document.getElementById('sfx-rainy').play().catch(() => {});
                }
            });
            card.addEventListener('mouseleave', function() {
                if (index === 0) {
                    document.getElementById('sfx-cloudy').pause();
                } else if (index === 1) {
                    document.getElementById('sfx-sunny').pause();
                } else if (index === 2) {
                    document.getElementById('sfx-rainy').pause();
                }
            });
        });

        // mood flower悬浮时第二文字停止闪烁
        document.querySelectorAll('.mood-flower').forEach(flower => {
            flower.addEventListener('mouseenter', function() {
                hintText.classList.add('hidden');
            });
        });

        // 卡片点击翻转
        document.querySelectorAll('.card-container').forEach((card, index) => {
            card.addEventListener('click', function() {
                this.classList.toggle('flipped');
                // 翻转时停止音频
                if (this.classList.contains('flipped')) {
                    if (index === 0) {
                        document.getElementById('sfx-cloudy').pause();
                    } else if (index === 1) {
                        document.getElementById('sfx-sunny').pause();
                    } else if (index === 2) {
                        document.getElementById('sfx-rainy').pause();
                    }
                }
                // 检查是否有任何卡片翻转
                const anyFlipped = document.querySelector('.card-container.flipped') !== null;
                if (anyFlipped) {
                    hintText.textContent = flowerText;
                    currentText = flowerText;
                } else {
                    hintText.textContent = originalText;
                    currentText = originalText;
                }
            });
        });

        // mood flower悬浮放大效果
        document.querySelectorAll('.mood-flower').forEach(flower => {
            flower.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.05)';
                const data = this.getAttribute('data');
                if (data.includes('mood flower1.svg')) {
                    document.getElementById('sfx-high5').currentTime = 0;
                    document.getElementById('sfx-high5').volume = 1;
                    document.getElementById('sfx-high5').play().catch(() => {});
                } else if (data.includes('mood flower2.svg')) {
                    document.getElementById('sfx-high4').currentTime = 0;
                    document.getElementById('sfx-high4').volume = 1;
                    document.getElementById('sfx-high4').play().catch(() => {});
                } else if (data.includes('mood flower3.svg')) {
                    document.getElementById('sfx-high3').currentTime = 0;
                    document.getElementById('sfx-high3').volume = 1;
                    document.getElementById('sfx-high3').play().catch(() => {});
                } else if (data.includes('mood flower4.svg')) {
                    document.getElementById('sfx-high2').currentTime = 0;
                    document.getElementById('sfx-high2').volume = 1;
                    document.getElementById('sfx-high2').play().catch(() => {});
                } else if (data.includes('mood flower5.svg')) {
                    document.getElementById('sfx-high1').currentTime = 0;
                    document.getElementById('sfx-high1').volume = 1;
                    document.getElementById('sfx-high1').play().catch(() => {});
                } else if (data.includes('mood flower111.svg')) {
                    document.getElementById('sfx-low5').currentTime = 0;
                    document.getElementById('sfx-low5').volume = 1;
                    document.getElementById('sfx-low5').play().catch(() => {});
                } else if (data.includes('mood flower222.svg')) {
                    document.getElementById('sfx-low4').currentTime = 0;
                    document.getElementById('sfx-low4').volume = 1;
                    document.getElementById('sfx-low4').play().catch(() => {});
                } else if (data.includes('mood flower333.svg')) {
                    document.getElementById('sfx-low3').currentTime = 0;
                    document.getElementById('sfx-low3').volume = 1;
                    document.getElementById('sfx-low3').play().catch(() => {});
                } else if (data.includes('mood flower444.svg')) {
                    document.getElementById('sfx-low2').currentTime = 0;
                    document.getElementById('sfx-low2').volume = 1;
                    document.getElementById('sfx-low2').play().catch(() => {});
                } else if (data.includes('mood flower555.svg')) {
                    document.getElementById('sfx-low1').currentTime = 0;
                    document.getElementById('sfx-low1').volume = 1;
                    document.getElementById('sfx-low1').play().catch(() => {});
                } else if (data.includes('mood flower11.svg')) {
                    document.getElementById('sfx-mid5').currentTime = 0;
                    document.getElementById('sfx-mid5').volume = 1;
                    document.getElementById('sfx-mid5').play().catch(() => {});
                } else if (data.includes('mood flower22.svg')) {
                    document.getElementById('sfx-mid4').currentTime = 0;
                    document.getElementById('sfx-mid4').volume = 1;
                    document.getElementById('sfx-mid4').play().catch(() => {});
                } else if (data.includes('mood flower33.svg')) {
                    document.getElementById('sfx-mid3').currentTime = 0;
                    document.getElementById('sfx-mid3').volume = 1;
                    document.getElementById('sfx-mid3').play().catch(() => {});
                } else if (data.includes('mood flower44.svg')) {
                    document.getElementById('sfx-mid2').currentTime = 0;
                    document.getElementById('sfx-mid2').volume = 1;
                    document.getElementById('sfx-mid2').play().catch(() => {});
                } else if (data.includes('mood flower55.svg')) {
                    document.getElementById('sfx-mid1').currentTime = 0;
                    document.getElementById('sfx-mid1').volume = 1;
                    document.getElementById('sfx-mid1').play().catch(() => {});
                }
            });
            flower.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });

        // 背景音乐
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2;
        function playBgm() {
            bgm.play().catch(() => {});
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playBgm, 100);
        } else {
            window.addEventListener('load', playBgm);
        }
    </script>
</body>
</html>
