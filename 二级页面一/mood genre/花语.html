<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1920px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #FFFFFF; overflow: hidden; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 花瓣悬浮放大效果 */
        .hover-zoom {
            position: absolute;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: right center;
            pointer-events: auto;
        }
        .hover-zoom:hover {
            transform: scale(1.1);
        }

        /* 文字入场动画初始状态 */
        .entrance-title {
            opacity: 0;
            transform: translateX(-100px);
        }

        /* 提示文字闪烁动画 */
        @keyframes hintBlink {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .hint-text {
            animation: hintBlink 1.5s ease-in-out infinite;
        }
        .hint-text.hidden {
            animation: none;
        }

        /* 卡片颜色切换样式 */
        .card-container {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
        }
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .card-back {
            opacity: 0;
        }
        .card-container.switched .card-front {
            opacity: 0;
        }
        .card-container.switched .card-back {
            opacity: 1;
        }

        /* 唱片旋转动画 */
        @keyframes recordSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .record-spin {
            animation: recordSpin 8s linear infinite;
        }
    </style>
</head>

                    gsap.set(cardRnbFront, { opacity: 1 });
                    gsap.set(cardRnbBack, { opacity: 0 });

                } else {
                    gsap.to(cardRomantic7Front, { opacity: 0, duration: 0.5, ease: 'power2.out' });
                    gsap.to(cardRomantic7Back, { opacity: 1, duration: 0.5, ease: 'power2.out' });
                    cardRomantic7El.classList.add('switched');
                }
            });
        }

        // 卡片7正面叉叉点击 - 循环切换到卡片1
        var xBtnRnbFront = document.getElementById('x-btn-rnb-front');
        if (xBtnRnbFront && cardRomantic7 && cardRomantic) {
            xBtnRnbFront.addEventListener('click', function(e) {
                e.stopPropagation();
                gsap.to(cardRomantic7, { opacity: 0, duration: 0.3, ease: 'power2.out', onComplete: function() {
                    cardRomantic7.style.display = 'none';
                    cardRomantic7.classList.remove('switched');
                    gsap.set(cardRomantic7Front, { opacity: 1 });
                    gsap.set(cardRomantic7Back, { opacity: 0 });
                    cardRomantic.style.display = 'block';
                    gsap.fromTo(cardRomantic, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'power2.out' });
                }});
            });
        }

        // 卡片7反面叉叉点击 - 循环切换到卡片1
        var xBtnRnbBack2 = document.getElementById('x-btn-rnb-back-2');
        if (xBtnRnbBack2 && cardRomantic7 && cardRomantic) {

        // 背景音乐
