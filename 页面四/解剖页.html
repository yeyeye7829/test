    <audio id="sfx-key1" src="../音乐/琴键1.mp3" preload="auto" volume="1"></audio>
    <audio id="sfx-key2" src="../音乐/琴键2.mp3" preload="auto" volume="1"></audio>

    <audio id="sfx-key4" src="../音乐/琴键4.mp3" preload="auto" volume="1"></audio>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 琴键悬浮放大播放声音
        var key1 = document.getElementById('piano-key-1');
        var key2 = document.getElementById('piano-key-2');
        var key3 = document.getElementById('piano-key-3');
        var key4 = document.getElementById('piano-key-4');
        var sfx1 = document.getElementById('sfx-key1');
        var sfx2 = document.getElementById('sfx-key2');
        var sfx3 = document.getElementById('sfx-key3');
        var sfx4 = document.getElementById('sfx-key4');

        console.log('key1:', key1, 'sfx1:', sfx1);

        if (key1) {
            key1.addEventListener('mouseenter', function() {
                console.log('key1 hover enter');
                sfx1.currentTime = 0;
                sfx1.volume = 1;
                sfx1.play().catch(e => console.log('sfx1 error:', e));
                key1.style.transform = 'scale(1.2)';
            });
            key1.addEventListener('mouseleave', function() {
                console.log('key1 hover leave');
                sfx1.pause();
                sfx1.currentTime = 0;
                key1.style.transform = 'scale(1)';
            });
            key1.addEventListener('click', function() {
                console.log('key1 clicked');
                sfx1.currentTime = 0;
                sfx1.volume = 1;
                sfx1.play().catch(e => console.log('sfx1 click error:', e));
            });
        }
        if (key2) {
            key2.addEventListener('mouseenter', function() {
                sfx2.currentTime = 0;
                sfx2.volume = 1;
                sfx2.play().catch(() => {});
                key2.style.transform = 'scale(1.2)';
            });
            key2.addEventListener('mouseleave', function() {
                sfx2.pause();
                sfx2.currentTime = 0;
                key2.style.transform = 'scale(1)';
            });
        }
        if (key3) {
            key3.addEventListener('mouseenter', function() {
                sfx3.currentTime = 0;
                sfx3.volume = 1;
                sfx3.play().catch(() => {});
                key3.style.transform = 'scale(1.2)';
            });
            key3.addEventListener('mouseleave', function() {
                sfx3.pause();
                sfx3.currentTime = 0;
                key3.style.transform = 'scale(1)';
            });
        }
        if (key4) {
            key4.addEventListener('mouseenter', function() {
                sfx4.currentTime = 0;
                sfx4.volume = 1;
                sfx4.play().catch(() => {});
                key4.style.transform = 'scale(1.2)';
            });
            key4.addEventListener('mouseleave', function() {
                sfx4.pause();
                sfx4.currentTime = 0;
                key4.style.transform = 'scale(1)';
            });
        }
    </script>
