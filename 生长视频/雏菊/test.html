<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        video { width: 1920px; height: 1080px; position: absolute; object-fit: cover; }
    </style>
</head>
<body>
    <div id="viewport-wrapper">
        <video autoplay loop muted playsinline>
            <source src="雏菊2.mov" type="video/quicktime">
        </video>
    </div>
</body>
</html>
