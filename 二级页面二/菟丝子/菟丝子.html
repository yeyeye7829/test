<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1920px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #FE9973; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 悬浮放大效果 */
        .hover-scale {
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .hover-scale:hover,
        .hover-scale.hovered {
            transform: scale(1.05);
        }

        .note-text:hover {
            transform: scale(1.3);
        }

        /* dj球悬浮往左旋转30度并放大 */
        .dj-ball .hover-scale {
            transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dj-ball .hover-scale:hover {
            transform: scale(1.15) rotate(-30deg);
        }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 音符文字 */
        .note-text {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 32px;
            font-weight: 400;
            z-index: 3000;
        }

        /* 返回按钮悬浮放大效果 */
        .phys-group img[src*="返回"] {
            cursor: pointer;
            transition: transform 0.2s ease;
            transform-origin: center center;
        }
        .phys-group img[src*="返回"]:hover {
            transform: scale(1.1);
        }

        /* tap flower 闪烁动画 */
        .tap-flower {
            animation: tapFlowerBlink 1.5s ease-in-out infinite;
        }
        @keyframes tapFlowerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }
        .tap-flower.stopped {
            animation: none;
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

            <span class="note-text hover-scale" style="left:1340px;top:518px;color:#FE9973;opacity:0;">Do</span>
            <span id="note-re" class="note-text hover-scale" style="left:1401px;top:518px;color:#E94812;opacity:0;">Re</span>
            <span class="note-text hover-scale" style="left:1460px;top:518px;color:#FE9973;opacity:0;">Me</span>
            <span class="note-text hover-scale" style="left:1526px;top:518px;color:#FE9973;opacity:0;">Fa</span>
            <span class="note-text hover-scale" style="left:1583px;top:518px;color:#FE9973;opacity:0;">Sol</span>
            <span class="note-text hover-scale" style="left:1649px;top:518px;color:#FE9973;opacity:0;">La</span>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 停止tap flower闪烁动画
        function stopTapFlowerBlink() {
            const tapFlower = document.querySelector('.tap-flower');
            if (tapFlower) {
                tapFlower.classList.add('stopped');
            }
        }

        // 点击花触发status线和social status动画
        document.querySelector('.flower-head').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示status线容器
            gsap.to('.status-line', {
                opacity: 1,
                duration: 0.3
            });
            // status线从右到左渐渐移开蒙版
            gsap.to('.status-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // status线出现完后，social status淡入
                    gsap.to('.social-status-top', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击label触发mood线和mood genre动画
        document.querySelector('.flower-label').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示mood线容器
            gsap.to('.mood-line', {
                opacity: 1,
                duration: 0.3
            });
            // mood线从右到左渐渐移开蒙版
            gsap.to('.mood-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'left center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // mood线出现完后，mood genre淡入
                    gsap.to('.mood-genre', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击土触发genre线和music genres、dj球动画
        document.querySelector('.flower-soil').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示genre线容器
            gsap.to('.genre-line', {
                opacity: 1,
                duration: 0.3
            });
            // genre线从左到右渐渐移开蒙版
            gsap.to('.genre-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // genre线出现完后，music genres和dj球淡入
                    gsap.to('.music-genres', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    gsap.to('.dj-ball', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out',
                        onStart: function() {
                            document.querySelector('.dj-ball').style.pointerEvents = 'auto';
                        }
                    });
                }
            });
        });

        // 点击茎触发creative线和creative input、音符文字动画
        document.querySelector('.flower-stem').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示creative线容器
            gsap.to('.creative-line', {
                opacity: 1,
                duration: 0.3
            });
            // creative线从左到右渐渐移开蒙版
            gsap.to('.creative-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // creative线出现完后，creative input淡入
                    gsap.to('.creative-input', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    // 音符文字依次出现
                    gsap.to('.note-text', {
                        opacity: 1,
                        duration: 0.5,
                        stagger: 0.1,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击叶子触发energy线和mood energy动画
        document.querySelector('.flower-leaf').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示energy线容器
            gsap.to('.energy-line', {
                opacity: 1,
                duration: 0.3
            });
            // energy线从右到左渐渐移开蒙版
            gsap.to('.energy-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'left center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // energy线出现完后，mood energy淡入
                    gsap.to('.mood-energy', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // Re悬浮播放声音
        document.querySelector('#note-re').addEventListener('mouseenter', function() {
            document.getElementById('sfx-re').currentTime = 0;
            document.getElementById('sfx-re').play().catch(() => {});
        });

        // dj球悬浮播放声音
        document.querySelector('.dj-ball').addEventListener('mouseenter', function() {
            document.getElementById('sfx-dj').currentTime = 0;
            document.getElementById('sfx-dj').volume = 0.07;
            document.getElementById('sfx-dj').play().catch(() => {});
        });

        // 返回按钮点击关闭弹窗
        document.querySelector('img[src*="返回"]').addEventListener('click', function() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePopup', '*');
            } else {
                window.close();
            }
        });

        // 背景音乐
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2;
        function playBgm() { bgm.play().catch(() => {}); }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playBgm, 100);
        } else {
            window.addEventListener('load', playBgm);
        }
    </script>
</body>
</html>
