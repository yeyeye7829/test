<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1920px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #FBF6F2; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 悬浮放大效果 */
        .hover-scale {
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .hover-scale:hover,
        .hover-scale.hovered {
            transform: scale(1.05);
        }

        /* 音符文字 */
        .note-text {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 32px;
            font-weight: 400;
            z-index: 3000;
        }
        .note-text:hover {
            transform: scale(1.3);
        }

        /* 返回按钮悬浮放大效果 */
        .phys-group img[src*="返回"] {
            cursor: pointer;
            transition: transform 0.2s ease;
            transform-origin: center center;
        }
        .phys-group img[src*="返回"]:hover {
            transform: scale(1.1);
        }

        /* 抒情耳朵悬浮往左旋转15度并放大 */
        .lyrical-ear .hover-scale {
            transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .lyrical-ear .hover-scale:hover {
            transform: scale(1.15) rotate(-15deg);
        }

        /* tap flower 闪烁动画 */
        .tap-flower {
            animation: tapFlowerBlink 1.5s ease-in-out infinite;
        }
        @keyframes tapFlowerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }
        .tap-flower.stopped {
            animation: none;
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 停止tap flower闪烁动画
        function stopTapFlowerBlink() {
            const tapFlower = document.querySelector('.tap-flower');
            if (tapFlower) {
                tapFlower.classList.add('stopped');
            }
        }

        // 点击叶子触发energy线和mood energy动画
        document.querySelector('.flower-leaf').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            gsap.to('.energy-line', {
                opacity: 1,
                duration: 0.3
            });
            gsap.to('.energy-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'left center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    gsap.to('.mood-energy', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击label触发mood线和mood genre动画
        document.querySelector('.flower-label').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            gsap.to('.mood-line', {
                opacity: 1,
                duration: 0.3
            });
            gsap.to('.mood-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    gsap.to('.mood-genre', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击花触发status线和social status动画
        document.querySelector('.flower-head').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            gsap.to('.status-line', {
                opacity: 1,
                duration: 0.3
            });
            gsap.to('.status-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    gsap.to('.social-status', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击土触发genre线和music genres、抒情耳朵动画
        document.querySelector('.flower-soil').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            gsap.to('.genre-line', {
                opacity: 1,
                duration: 0.3
            });
            gsap.to('.genre-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'left center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    gsap.to('.music-genres', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    gsap.to('.lyrical-ear', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out',
                        onStart: function() {
                            document.querySelector('.lyrical-ear').style.pointerEvents = 'auto';
                        }
                    });
                }
            });
        });

        // 点击茎触发creative线和creative input、音符文字动画
        document.querySelector('.flower-stem').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            gsap.to('.creative-line', {
                opacity: 1,
                duration: 0.3
            });
            gsap.to('.creative-mask', {
                transform: 'scaleX(0)',
                transformOrigin: 'right center',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    gsap.to('.creative-input', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    gsap.to('.note-text', {
                        opacity: 1,
                        duration: 0.5,
                        stagger: 0.1,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // Si悬浮播放声音
        document.querySelector('#note-si').addEventListener('mouseenter', function() {
            document.getElementById('sfx-si').currentTime = 0;
            document.getElementById('sfx-si').play().catch(() => {});
        });

        // 抒情耳朵悬浮播放声音
        document.querySelector('.lyrical-ear').addEventListener('mouseenter', function() {
            document.getElementById('sfx-balei').currentTime = 0;
            document.getElementById('sfx-balei').volume = 0.5;
            document.getElementById('sfx-balei').play().catch(() => {});
        });

        // 返回按钮点击关闭弹窗
        document.querySelector('img[src*="返回"]').addEventListener('click', function() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePopup', '*');
            } else {
                window.close();
            }
        });

        // 背景音乐
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2;
        function playBgm() { bgm.play().catch(() => {}); }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playBgm, 100);
        } else {
            window.addEventListener('load', playBgm);
        }
    </script>
</body>
</html>
