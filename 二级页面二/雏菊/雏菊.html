<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #viewport-wrapper { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #page-canvas { width: 1920px; height: 1080px; position: relative; flex-shrink: 0; transform-origin: center center; transition: transform 0.1s ease-out; background: #B8D6FF; }

        .page-title {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 128px;
            font-weight: 400;
            color: #000;
            top: 839px;
            left: 137px;
            z-index: 1000;
            line-height: 1;
        }
        .page-title span { display: inline-block; margin-right: 0.25em; cursor: default; }
        .slash-wrapper { position: absolute; left: 508px; top: 856.69px; z-index: 2000; pointer-events: auto !important; }
        .slash-wrapper svg { pointer-events: auto !important; display: block; }

        /* 物理组容器 - shape黑盒 */
        .phys-group { position: absolute; cursor: pointer; }
        .shape-svg { position: absolute; top: 0; left: 0; display: block; }

        /* 线条画布 - 独立svg层 */
        .stem-svg { position: absolute; pointer-events: none; overflow: visible; }

        /* 音符文字 */
        .note-text {
            position: absolute;
            font-family: 'Tilt Warp', sans-serif;
            font-size: 32px;
            font-weight: 400;
            z-index: 100;
        }

        /* 返回按钮悬浮放大效果 */
        .phys-group img[src*="返回"] {
            cursor: pointer;
            transition: transform 0.2s ease;
            transform-origin: center center;
        }
        .phys-group img[src*="返回"]:hover {
            transform: scale(1.1);
        }

        /* 悬浮放大效果 */
        .hover-scale {
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }

        /* 音符文字悬浮放大 */
        .note-text:hover {
            transform: scale(1.3);
        }

        /* 婴儿头悬浮往左旋转30度并放大 */
        .baby-head {
            transform-origin: 55.5px 51px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .baby-head:hover {
            transform: scale(1.1) rotate(-30deg);
        }

        /* 花朵头部 - 放大中心 */
        .flower-head {
            transform-origin: 50% center;
        }

        /* 叶子 - 放大中心 */
        .flower-leaf {
            transform-origin: 35% center;
        }

        /* 茎 - 放大中心往左挪，视觉在底层但hover区域大 */
        .stem {
            transform-origin: 0% center;
            position: relative;
            z-index: 1;
        }
        .stem:hover {
            transform: scale(1.15);
            z-index: 1;
        }

        /* tap flower 闪烁动画 */
        .tap-flower {
            animation: tapFlowerBlink 1.5s ease-in-out infinite;
        }
        @keyframes tapFlowerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }
        .tap-flower.stopped {
            animation: none;
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>
    <audio id="bgm" src="../../音乐/二级页面1背景乐.mp3" loop volume="0.2"></audio>

            </div>

            <!-- 雏菊1 叶子 -->

            <!-- 雏菊label -->
            <div class="phys-group hover-scale" style="left:1029px;top:819px;z-index:6;">

            <!-- 音符文字 -->

            <span class="note-text hover-scale" style="left:1398px;top:518px;color:#6697DC;opacity:0;">Re</span>
            <span class="note-text hover-scale" style="left:1456px;top:518px;color:#6697DC;opacity:0;">Me</span>
            <span id="note-fa" class="note-text hover-scale" style="left:1522px;top:518px;color:#2F4ECD;opacity:0;">Fa</span>
            <span class="note-text hover-scale" style="left:1580px;top:518px;color:#6697DC;opacity:0;">Sol</span>
            <span class="note-text hover-scale" style="left:1646px;top:518px;color:#6697DC;opacity:0;">La</span>
            <span class="note-text hover-scale" style="left:1701px;top:518px;color:#6697DC;opacity:0;">Si</span>
        </div>
    </div>

    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('page-canvas');
            if (!canvas) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // 停止tap flower闪烁动画
        function stopTapFlowerBlink() {
            const tapFlower = document.querySelector('.tap-flower');
            if (tapFlower) {
                tapFlower.classList.add('stopped');
            }
        }

        // 点击叶子触发energy线和mood energy动画
        document.querySelector('.flower-leaf').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示energy线容器
            gsap.to('.energy-line', {
                opacity: 1,
                duration: 0.3
            });
            // energy线从右到左渐渐移开蒙版（无挤压）
            gsap.to('.energy-mask', {
                width: '0%',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // energy线出现完后，mood energy淡入
                    gsap.to('.mood-energy', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击花触发status线和social status动画
        document.querySelector('.flower-head').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示status线容器
            gsap.to('.status-line', {
                opacity: 1,
                duration: 0.3
            });
            // status线从左到右渐渐移开蒙版
            gsap.to('.status-mask', {
                width: '0%',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // status线出现完后，social status淡入
                    gsap.to('.social-status-top', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击茎触发creative线和creative input动画
        document.querySelector('.stem').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示creative线容器
            gsap.to('.creative-line', {
                opacity: 1,
                duration: 0.3
            });
            // creative线从左到右渐渐移开蒙版
            gsap.to('.creative-mask', {
                width: '0%',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // creative线出现完后，creative input淡入
                    gsap.to('.creative-input', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    // 同时音符文字依次出现
                    gsap.to('.note-text', {
                        opacity: 1,
                        duration: 0.5,
                        stagger: 0.1,
                        ease: 'power2.out'
                    });
                }
            });
        });

        // 点击label触发genre线、mood线和mood genre动画
        document.querySelector('img[src*="label"]').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示genre线容器
            gsap.to('.genre-line', {
                opacity: 1,
                duration: 0.3
            });
            // genre线从左到右渐渐移开蒙版
            gsap.to('.genre-mask', {
                width: '0%',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // genre线出现完后，mood genre淡入
                    gsap.to('.mood-genre', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                }
            });

            // 显示mood线容器
            gsap.to('.mood-line-container', {
                opacity: 1,
                duration: 0.3
            });
            // mood线从左到右渐渐移开蒙版
            gsap.to('.mood-line-mask', {
                width: '0%',
                duration: 3,
                ease: 'none'
            });
        });

        // 点击土触发genre线、music genres和婴儿头动画
        document.querySelector('.soil').addEventListener('click', function() {
            document.getElementById('sfx-woodblock').currentTime = 0;
            document.getElementById('sfx-woodblock').volume = 0.1;
            document.getElementById('sfx-woodblock').play().catch(() => {});
            stopTapFlowerBlink();
            // 显示genre线容器
            gsap.to('.genre-line', {
                opacity: 1,
                duration: 0.3
            });
            // genre线从右到左渐渐移开蒙版（蒙版在左边，缩小蒙版宽度）
            gsap.to('.genre-mask', {
                width: '0%',
                duration: 3,
                ease: 'none',
                onComplete: function() {
                    // genre线出现完后，music genres和婴儿头淡入
                    gsap.to('.music-genres', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out'
                    });
                    gsap.to('.baby-head', {
                        opacity: 1,
                        duration: 0.5,
                        ease: 'power2.out',
                        onStart: function() {
                            document.querySelector('.baby-head').style.pointerEvents = 'auto';
                        }
                    });
                }
            });
        });

        // Fa悬浮播放声音
        document.querySelector('#note-fa').addEventListener('mouseenter', function() {
            document.getElementById('sfx-fa').currentTime = 0;
            document.getElementById('sfx-fa').play().catch(() => {});
        });

        // 婴儿头悬浮播放声音
        document.querySelector('.baby-head').addEventListener('mouseenter', function() {
            document.getElementById('sfx-child').currentTime = 0;
            document.getElementById('sfx-child').play().catch(() => {});
        });

        // 返回按钮点击关闭弹窗
        document.querySelector('img[src*="返回"]').addEventListener('click', function() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('closePopup', '*');
            } else {
                window.close();
            }
        });

        // 背景音乐
        const bgm = document.getElementById('bgm');
        bgm.volume = 0.2;
        function playBgm() { bgm.play().catch(() => {}); }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playBgm, 100);
        } else {
            window.addEventListener('load', playBgm);
        }
    </script>
</body>
</html>
